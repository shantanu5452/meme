<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🐱 Cat Meme Cam AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<!-- ================= HEADER ================= -->

<header>

    <div class="logo">

        🐱 Cat Meme Cam AI

    </div>

    <div class="header-right">

        <button id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

        <button>

            <i class="fa-solid fa-gear"></i>

        </button>

    </div>

</header>

<!-- ================= MAIN ================= -->

<main>

    <!-- LEFT SIDE -->

    <section class="camera-section">

        <div class="glass-card">

            <h2>

                📷 Live Camera

            </h2>

            <div class="camera-box">

                <video
                        id="video"
                        autoplay
                        playsinline>
                </video>

                <canvas id="canvas"></canvas>

            </div>

            <div class="camera-info">

                <div class="info-box">

                    <h3>FPS</h3>

                    <p id="fps">

                        0

                    </p>

                </div>

                <div class="info-box">

                    <h3>Confidence</h3>

                    <p id="confidence">

                        0%

                    </p>

                </div>

                <div class="info-box">

                    <h3>Hands</h3>

                    <p id="hands">

                        0

                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- RIGHT SIDE -->

    <section class="meme-section">

        <div class="glass-card">

            <h2>

                😂 Meme Reaction

            </h2>

            <img

                    id="meme"

                    src="assets/memes/default.jpg"

                    alt="Meme">

            <h2 id="gestureName">

                Waiting for Camera...

            </h2>

        </div>

    </section>

</main>

<!-- ================= DASHBOARD ================= -->

<section class="dashboard">

    <div class="dashboard-card">

        <h3>

            Current Gesture

        </h3>

        <p id="gesture">

            None

        </p>

    </div>

    <div class="dashboard-card">

        <h3>

            Emotion

        </h3>

        <p id="emotion">

            😊 Happy

        </p>

    </div>

    <div class="dashboard-card">

        <h3>

            Status

        </h3>

        <p id="status">

            Waiting

        </p>

    </div>

    <div class="dashboard-card">

        <h3>

            Session Time

        </h3>

        <p id="timer">

            00:00

        </p>

    </div>

</section>

<!-- ================= CONTROLS ================= -->

<section class="controls">

    <button id="startBtn">

        <i class="fa-solid fa-camera"></i>

        Start Camera

    </button>

    <button id="captureBtn">

        📸 Screenshot

    </button>

    <button id="recordBtn">

        🎥 Record

    </button>

    <button id="uploadBtn">

        📂 Upload Memes

    </button>

</section>

<!-- ================= HISTORY ================= -->

<section class="history">

    <div class="glass-card">

        <h2>

            Recent Gestures

        </h2>

        <div id="historyContainer">

            No gestures detected yet.

        </div>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

    Built using

    HTML • CSS • JavaScript • MediaPipe AI

</footer>

<!-- ================= MODULES ================= -->

<script type="module" src="app.js"></script>

</body>

</html>
