<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cat Meme Cam AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">

🐱 Cat Meme Cam AI

</div>

<div class="menu">

<button id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

<button>

<i class="fa-solid fa-gear"></i>

</button>

</div>

</header>

<main>

<section class="left">

<div class="glass">

<h2>📷 Camera</h2>

<video id="video" autoplay playsinline></video>

<div class="stats">

<div>

<h3>FPS</h3>

<p id="fps">0</p>

</div>

<div>

<h3>Confidence</h3>

<p id="confidence">0%</p>

</div>

<div>

<h3>Status</h3>

<p id="status">Waiting</p>

</div>

</div>

</div>

</section>

<section class="right">

<div class="glass">

<h2>😂 Meme Reaction</h2>

<img id="meme" src="assets/memes/default.jpg">

<h2 id="gesture">

Waiting for Camera...

</h2>

</div>

</section>

</main>

<section class="bottom">

<div class="glass small">

<h3>Current Gesture</h3>

<p id="gestureText">

None

</p>

</div>

<div class="glass small">

<h3>Emotion</h3>

<p>

😊 Happy

</p>

</div>

<div class="glass small">

<h3>Detected Hands</h3>

<p id="hands">

0

</p>

</div>

</section>

<section class="controls">

<button id="start">

▶ Start Camera

</button>

<button>

📸 Screenshot

</button>

<button>

🎥 Record

</button>

<button>

📂 Upload Memes

</button>

</section>

<footer>

Made using HTML • CSS • JavaScript

</footer>

<script type="module" src="app.js"></script>

</body>

</html>
